name: cd

permissions:
  contents: read
  deployments: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: setup npm
        run: |
          ./npm_use.sh &&
          npm --version &&
          npm list -g --depth 0

      - name: restore astro cache (PR)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: node_modules/.astro
          key: astro-cache-v1-pr-no-save
          restore-keys: |
            astro-cache-v1-

      - name: get astro cache (main)
        if: github.event_name == 'push'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: node_modules/.astro
          key: astro-cache-v1-${{ github.run_id }}
          restore-keys: |
            astro-cache-v1-

      - name: restore content cache (PR)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .cache
          key: content-cache-v1-pr-no-save
          restore-keys: |
            content-cache-v1-

      - name: get content cache (main)
        if: github.event_name == 'push'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .cache
          key: content-cache-v1-${{ github.run_id }}
          restore-keys: |
            content-cache-v1-

      - name: install dependencies
        run: npm install

      - name: build
        run: npm run build

      - name: add indexNow key (main)
        if: github.event_name == 'push'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: echo $INDEXNOW_KEY > dist/$INDEXNOW_KEY.txt

      - name: deploy
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654 # v3.0
        with:
          publish-dir: "./dist"
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          enable-commit-comment: false
          enable-commit-status: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          timeout-minutes: 5
